global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: api-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-service:8000
  - job_name: agents
    metrics_path: /metrics
    static_configs:
      - targets:
          - queue-agent:8011
          - resource-agent:8012
          - sla-agent:8013
          - forecast-agent:8014
          - coordinator-agent:8015
          - executor-agent:8016
          - load-generator:8017
